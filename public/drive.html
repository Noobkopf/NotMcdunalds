<!-- Menü Auswahl Fenster -->

<div id="menuPopup" class="box" style="display:none;">


<h2>🍔 Menü zusammenstellen</h2>


<p id="menuTitle"></p>



<h3>🥤 Getränk auswählen</h3>


<select id="drinkChoice">

<option>Cola Soda</option>

<option>Orange Soda</option>

<option>Creaming Soda</option>

<option>Iced Tea</option>

</select>



<h3>🍟 Snack auswählen</h3>


<select id="snackChoice">

<option>French Fries</option>

</select>



<br><br>



<button onclick="confirmMenu()">

✅ Menü hinzufügen

</button>



<button onclick="closeMenu()">

❌ Abbrechen

</button>


</div>







<h2>🛒 Deine Bestellung</h2>


<div id="cart">

Noch leer

</div>







<h2>📍 Ausgabe</h2>


<div class="box">

🚗 Drive-Thru

<br>

🥡 Mitnehmen

</div>







<br>



<button id="orderButton" class="order" onclick="sendOrder()">

✅ Bestellung abschicken

</button>






<h2 id="result"></h2>








<script>


let items = [];

let selectedMenu = "";

let selectedMenuPrice = "";





function addItem(item){

items.push(item);

updateCart();

}





function updateCart(){


let cart=document.getElementById("cart");



if(items.length===0){

cart.innerHTML="Noch leer";

return;

}



cart.innerHTML="";



items.forEach((item,index)=>{


cart.innerHTML +=

"• "+item+

" <button onclick='removeItem("+index+")'>❌</button><br>";


});


}





function removeItem(index){

items.splice(index,1);

updateCart();

}








function openMenu(menu,price){


selectedMenu=menu;

selectedMenuPrice=price;



document.getElementById("menuTitle").innerHTML=

"🍔 "+menu;



document.getElementById("menuPopup").style.display="block";


}







function closeMenu(){


document.getElementById("menuPopup").style.display="none";


}







function confirmMenu(){


let drink=document.getElementById("drinkChoice").value;


let snack=document.getElementById("snackChoice").value;



addItem(

selectedMenu+

" - "+

selectedMenuPrice+

" + 🍟 "+

snack+

" + 🥤 "+

drink

);



closeMenu();


}









function sendOrder(){



if(items.length===0){

alert("Bitte erst etwas auswählen!");

return;

}




fetch("/order",{

method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

items:items,

type:"Mitnehmen",

location:"Drive-Thru"

})


})



.then(res=>res.json())



.then(data=>{



if(data.error){

alert(data.error);

return;

}



document.getElementById("result").innerHTML=


"🎉 Bestellung erfolgreich!<br><br>"+


"Deine Bestellnummer: <b>#"+


data.order.number+


"</b><br><br>"+


"Bitte fahre weiter zum Ausgabefenster 🚗";




items=[];

updateCart();


});


}









function checkShopStatus(){



fetch("/shop-status")

.then(res=>res.json())


.then(data=>{


let status=document.getElementById("shopStatus");

let button=document.getElementById("orderButton");



if(data.open){


status.innerHTML="🟢 NotMcDunalds ist geöffnet";


button.disabled=false;


}

else{


status.innerHTML="🔴 NotMcDunalds ist geschlossen";


button.disabled=true;


}


});


}






checkShopStatus();


setInterval(checkShopStatus,5000);



</script>





</body>

</html>
